<div class="flex flex-col w-44 text-sm relative">

  <button type="button" (click)="toggle()"
    class="w-full text-left px-4 pr-2 py-2 border rounded bg-white text-gray-700 border-gray-300 shadow-sm hover:bg-gray-50 focus:outline-none">
    <span>{{ value || placeholder }}</span>
    <svg class="w-5 h-5 inline float-right transition-transform duration-200"
      [class]="isOpen() ? 'rotate-0' : '-rotate-90'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
      stroke="#6B7280">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7" />
    </svg>
  </button>

  @if (isOpen()) {
  <ul class="absolute top-full mt-1 w-full bg-white border border-gray-300 rounded shadow-md py-2 z-10">
    @for (option of options; track option) {
    <li (click)="select(option)" class="px-4 py-2 hover:bg-indigo-500 hover:text-white cursor-pointer"
      [class]="value === option ? 'bg-indigo-500 text-white' : ''">
      {{ option }}
    </li>
    }
  </ul>
  }

</div>
