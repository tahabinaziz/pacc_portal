<div class="flex h-screen w-full items-center justify-center bg-slate-950 px-6">

  <div class="bg-slate-800/90 backdrop-blur-lg rounded-2xl shadow-xl p-8 md:p-10 w-full max-w-md border border-white/5">

    <div class="flex flex-col items-center">
      <img class="h-20 md:h-30 w-auto mb-6" [src]="angular" alt="Card Logo" />

      <h2
        class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-red-400 to-yellow-400">
        {{ title }}
      </h2>

      <p *ngIf="description" class="text-sm text-slate-400 mt-4">
        {{ description }}
      </p>
    </div>

    <div class="mt-4 flex flex-col gap-5">
      <ng-content></ng-content>
    </div>

  </div>
</div>
