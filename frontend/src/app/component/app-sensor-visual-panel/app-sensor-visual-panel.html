<div class="w-1/2 relative hidden lg:block">
  <img [src]="bridge" alt="Login Visual" class="w-full h-full" />

  <!-- Gradient Overlay -->
  <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/50 to-transparent"></div>

  <!-- Content -->
  <div class="absolute inset-0 flex flex-col justify-center items-start px-16 text-white">
    <div class="max-w-lg">

      <h1 class="text-6xl font-bold mb-6 leading-tight">
        Smart Sensors
        <span class="bg-gradient-to-r from-green-400 to-blue-400 bg-clip-text text-transparent">
          Monitoring
        </span>
      </h1>

      <p class="text-xl mb-8 text-gray-200 leading-relaxed">
        Monitor, analyze, and control your sensors in real-time. Get instant
        insights from your connected devices with our intelligent dashboard.
      </p>

      <!-- Pills -->
      <div class="flex flex-wrap gap-3">
        <div class="bg-white/10 px-4 py-2 rounded-full border border-white/20">
          <span class="text-sm font-medium">📡 Real-time Data</span>
        </div>
        <div class="bg-white/10 px-4 py-2 rounded-full border border-white/20">
          <span class="text-sm font-medium">🔧 Device Control</span>
        </div>
        <div class="bg-white/10 px-4 py-2 rounded-full border border-white/20">
          <span class="text-sm font-medium">📊 Smart Analytics</span>
        </div>
        <div class="bg-white/10 px-4 py-2 rounded-full border border-white/20">
          <span class="text-sm font-medium">⚡ Instant Alerts</span>
        </div>
      </div>

    </div>
  </div>
</div>
