<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 w-full max-w-sm p-8">
    <h1 class="text-2xl font-serif text-gray-900 mb-1">Reset password</h1>
    <p class="text-sm text-gray-400 mb-6">We'll send a link to your inbox</p>

    <div *ngIf="success" class="bg-green-50 text-green-700 text-sm rounded-lg px-4 py-3 mb-4">
      ✓ Check your email for a reset link
    </div>
    <div *ngIf="error" class="bg-red-50 text-red-700 text-sm rounded-lg px-4 py-3 mb-4">{{ error }}</div>

    <div *ngIf="!success" class="flex flex-col gap-4">
      <div>
        <label class="text-xs font-medium text-gray-500 tracking-wide">Email address</label>
        <input [(ngModel)]="email" type="email" placeholder="you@example.com"
          class="mt-1 w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <button (click)="onSubmit()" [disabled]="loading"
        class="w-full bg-gray-900 text-amber-100 rounded-lg py-2.5 text-sm font-medium hover:opacity-90 transition-opacity mt-1 disabled:opacity-50">
        {{ loading ? 'Sending…' : 'Send reset link →' }}
      </button>
    </div>

    <p class="text-xs text-center text-gray-400 mt-5">
      <a routerLink="/login" class="text-indigo-600">← Back to sign in</a>
    </p>
  </div>
</div>
