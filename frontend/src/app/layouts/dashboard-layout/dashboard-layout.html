<div class="flex flex-col h-screen bg-gray-50">

  <!-- Navbar -->
  <nav class="h-14 bg-slate-900 flex items-center px-5 gap-4 flex-shrink-0">
    <span class="font-serif text-amber-100 text-lg tracking-wide mr-auto">✦ Porta</span>


    <!-- Bell -->
    <button class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#94a3b8" stroke-width="1.5">
        <path d="M8 2a5 5 0 0 1 5 5v2l1 2H2l1-2V7a5 5 0 0 1 5-5z" />
        <path d="M6.5 13a1.5 1.5 0 0 0 3 0" />
      </svg>
    </button>

    <!-- Avatar -->
    <!-- <div
      class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center text-slate-900 text-xs font-medium cursor-pointer">
      {{ getInitials() }}
    </div> -->
    <!-- Avatar with dropdown -->
    <div class="relative">
      <div (click)="toggleUserMenu()"
        class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center text-slate-900 text-xs font-medium cursor-pointer select-none">
        {{ getInitials() }}
      </div>

      @if (userMenuOpen()) {
      <div class="absolute right-0 top-10 w-48 bg-white border border-gray-100 rounded-xl shadow-lg py-1 z-50">

        <!-- User info -->
        <div class="px-4 py-3 border-b border-gray-100">
          <p class="text-sm font-medium text-gray-900">{{ user?.name }}</p>
          <p class="text-xs text-gray-400 truncate">{{ user?.email }}</p>
        </div>

        <!-- Menu items -->
        <button class="w-full text-left px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 transition-colors">
          Profile
        </button>
        <button class="w-full text-left px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 transition-colors">
          Settings
        </button>

        <div class="border-t border-gray-100 mt-1 pt-1">
          <button (click)="logout()"
            class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 transition-colors">
            Logout
          </button>
        </div>

      </div>
      }
    </div>
  </nav>

  <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-52 bg-slate-900 flex flex-col px-2.5 py-4 border-r border-white/5 flex-shrink-0">

      <p class="text-[10px] text-slate-500 uppercase tracking-widest px-2.5 mb-1">Dashboard</p>

      @for (item of menuItems.slice(0, 4); track item.route) {
      <a [routerLink]="item.route" routerLinkActive="bg-amber-100/10 text-amber-100"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-slate-400 text-sm hover:bg-white/5 hover:text-slate-300 transition-colors mb-0.5">
        {{ item.label }}
      </a>
      }


      @for (item of menuItems.slice(4); track item.route) {
      <a [routerLink]="item.route" routerLinkActive="bg-amber-100/10 text-amber-100"
        class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-slate-400 text-sm hover:bg-white/5 hover:text-slate-300 transition-colors mb-0.5">
        {{ item.label }}
      </a>
      }

      <div class="flex-1"></div>

      <!-- Logout -->
      <button (click)="logout()"
        class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-red-400 text-sm hover:bg-red-500/10 transition-colors w-full">
        Logout
      </button>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-auto p-6">
      <router-outlet />
    </main>

  </div>
</div>
